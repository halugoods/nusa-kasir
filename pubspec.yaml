name: nusa_kasir
description: "NUSA - Aplikasi Kasir untuk Toko Kelontong"
publish_to: 'none'
version: 1.0.3+11

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_secure_storage: ^9.2.4
  cryptography: ^2.7.0
  supabase_flutter: ^2.5.0
  mobile_scanner: ^6.0.2
  nfc_manager: ^3.0.1
  esc_pos_bluetooth: ^0.4.1
  esc_pos_utils: ^1.1.0
  barcode: ^2.2.8
  barcode_widget: ^2.0.0
  qr_flutter: ^4.1.0
  google_sign_in: ^6.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.8
  googleapis: ^13.2.0
  url_launcher: ^6.3.0
  excel: ^4.0.0
  csv: ^5.0.0
  connectivity_plus: ^6.0.3
  workmanager: ^0.9.0+3
  uuid: ^4.5.1
  intl: ^0.19.0
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  flutter_local_notifications: ^19.0.0
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1

# NOTE: esc_pos_bluetooth pins rxdart ^0.26.0 while supabase_flutter >=2.5.0
# requires rxdart >=0.27.5 <0.29.0. No single rxdart version satisfies both,
# so we force a compatible version to keep both packages.
dependency_overrides:
  rxdart: 0.27.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
